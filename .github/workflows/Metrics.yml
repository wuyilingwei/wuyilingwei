name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * 0"}]
  # (optional) Run workflow manually
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Patched fork: wuyilingwei/metrics@patched makes the lines plugin
      # null-safe at source/plugins/lines/index.mjs:62 (author?.login),
      # fixing the null-author crash that broke the upstream action. See agents/001.
      - uses: wuyilingwei/metrics@patched
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          plugin_lines: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
