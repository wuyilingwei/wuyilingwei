name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * 0"}]
  # (optional) Run workflow manually
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Pinned to official v3.34 (uses the prebuilt image, stable & fast).
      # plugin_lines stays off: it crashes on this repo's null-author commit
      # (lines/index.mjs:62). A patched fork was attempted but the upstream
      # Dockerfile no longer rebuilds (nokogiri / sharp-libvips download 504).
      # See agents/001 for the full investigation.
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
